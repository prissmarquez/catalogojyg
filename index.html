<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JyG Catálogo</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- HEADER -->
    <header class="hero">

        <!-- LOGO -->
        <img src="images/logo.jpg" alt="Logo JyG" class="logo">

        <!-- TITULO -->
        <h1>JyG Catálogo</h1>

        <!-- DESCRIPCION -->
        <p class="descripcion">
            Bienvenido al catálogo digital de JyG.
            Explora nuestros productos organizados por categorías
            y encuentra fácilmente lo que necesitas.
        </p>

        <!-- BARRA DE BUSQUEDA -->
        <div class="search-container">
            <input type="text" placeholder="Buscar productos..." class="search-bar">

            <button class="search-btn">
                Buscar
            </button>
        </div>

    </header>

</body>

</html>
