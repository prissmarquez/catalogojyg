<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JyG Catálogo</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <!-- LOGO -->
        <div class="nav-logo">
            <img src="images/logo.jpg" alt="Logo JyG">
        </div>

        <!-- BUSCADOR -->
        <div class="nav-search">

            <input 
                type="text" 
                placeholder="Buscar productos..."
            >

            <button>
                Buscar
            </button>

        </div>

    </nav>

    <!-- HERO -->
    <section class="hero">

        <h1>JyG Catálogo</h1>

        <p>
            Explora miles de productos organizados por categorías.

        <!-- BOTON -->
        <a href="categorias-a.html" class="catalog-btn">
            Ver catálogo
        </a>

    </section>

    <!-- CATEGORIAS DESTACADAS -->
    <section class="featured">

        <h2>Categorías destacadas</h2>

        <div class="featured-grid">

            <a href="#" class="featured-card">
                Abrazaderas
            </a>

            <a href="#" class="featured-card">
                Acero inoxidable
            </a>

            <a href="#" class="featured-card">
                Artefactos eléctricos
            </a>

            <a href="#" class="featured-card">
                Aspersores
            </a>

        </div>

    </section>

</html>
