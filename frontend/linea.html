<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ABRAZADERAS | Materiales JyG</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

</head>

<body>

  <!-- NAVBAR -->

  <nav class="navbar">

    <div class="navbar-inner">

      <div class="brand">

        <a href="index.html">

          <div class="brand-name">
            Materiales JyG
          </div>

          <div class="brand-sub">
            Catálogo de productos
          </div>

        </a>

      </div>

      <!-- SEARCH -->
      <div class="search-wrap">

        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>

        <input type="text" id="searchInput" placeholder="Buscar productos...">

        <div id="searchResults" class="search-results"></div>

      </div>

    </div>

  </nav>

  <!-- HERO -->

  <section class="line-hero">

    <div class="line-badge">
      Línea de productos
    </div>

    <h1 id="lineTitle"></h1>

    <p>
      Productos disponibles en esta línea.
    </p>

  </section>

  <!-- LISTA PRODUCTOS -->

  <main class="products-list" id="productsList">

  </main>

  <script src="app.js"></script>

  <script>

    const API_URL = "http://localhost:3000";

    const searchInput =
      document.getElementById("searchInput");

    const searchResults =
      document.getElementById("searchResults");

    if (searchInput) {

      searchInput.addEventListener("input", async () => {

        const texto =
          searchInput.value.trim();

        if (texto.length < 2) {

          searchResults.style.display = "none";
          searchResults.innerHTML = "";

          return;
        }

        try {

          const response =
            await fetch(
              `${API_URL}/api/busqueda?q=${encodeURIComponent(texto)}`
            );

          const resultados =
            await response.json();

          searchResults.innerHTML = "";

          if (resultados.length === 0) {

            searchResults.innerHTML = `
            <div class="search-result-item">
              No se encontraron resultados
            </div>
          `;

            searchResults.style.display = "block";

            return;
          }

          resultados.forEach(item => {

            const a =
              document.createElement("a");

            a.className =
              "search-result-item";

            // SI ES LÍNEA
            if (item.tipo === "linea") {

              a.href =
                `linea.html?linea=${encodeURIComponent(item.linea)}`;

              a.innerHTML = `
              <strong>${item.linea}</strong>

              <div class="search-result-line">
                Línea
              </div>
            `;
            }

            // SI ES PRODUCTO
            else {

              a.href =
                `producto.html?linea=${encodeURIComponent(item.linea)}&clave=${item.Clave}`;

              a.innerHTML = `
              <strong>${item.Nombre}</strong>

              <div class="search-result-line">
                ${item.linea}
              </div>
            `;
            }

            searchResults.appendChild(a);

          });

          searchResults.style.display = "block";

        } catch (error) {

          console.error(error);

        }

      });

      // cerrar resultados
      document.addEventListener("click", (e) => {

        if (
          !searchInput.contains(e.target) &&
          !searchResults.contains(e.target)
        ) {

          searchResults.style.display = "none";

        }

      });

    }

  </script>

</body>

</html>
