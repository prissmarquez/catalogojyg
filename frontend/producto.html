<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Producto | Materiales JyG</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="navbar-inner">

            <div class="brand">

                <a href="index.html">

                    <div class="brand-name">
                        Materiales JyG
                    </div>

                    <div class="brand-sub">
                        Catálogo de productos
                    </div>

                </a>

            </div>

        </div>

    </nav>

    <!-- PRODUCTO -->

    <main class="product-page">

        <!-- IMAGEN -->

        <div class="product-gallery">

            <!-- <img id="productImage" src="" alt="Producto">
             <img id="productImage" src="" alt="Producto" onerror="this.style.display='none'"> -->
             <img
    id="productImage"
    src=""
    alt="Producto"
    style="width:100%; max-width:500px; border-radius:20px;"
>

        </div>

        <!-- INFO -->

        <div class="product-info">

            <div class="product-line" id="productLine"></div>

            <h1 id="productName"></h1>

            <p class="product-description" id="productDescription"></p>

            <!-- DATOS -->

            <div class="product-data">

                <div class="data-card">

                    <span>Código</span>

                    <strong id="productCode"></strong>

                </div>

                <div class="data-card">

                    <span>Disponibilidad</span>

                    <strong>En existencia</strong>

                </div>

            </div>

        </div>

    </main>

    <script src="app.js"></script>

</body>

</html>
